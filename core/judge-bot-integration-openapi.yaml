openapi: 3.0.0

info:
  title: API для интеграции с ботом судей
  version: 2.0.0
  description: |

    ## Принципы работы

    1) API `divisions` отдает филиалы
    2) API `disicplines` отдает спортивные дисциплины. На стороне чат бота происходит мапинг дисциплин
    * индивидуальные дисциплины (`isTeam = false`) содержат одно соревнование (`competition`)
    * командные дисциплины (`isTeam = true`) содержат турнирную сетку (`stages`) с соревнованиями
    3) API `athletes` отдает список спортсменов с их дисциплинами и командами
    4) API `results` принимает результаты конкретного соревнования

    ## Changelog

    ### 2.0.0

    * <font color="red">**Breaking!**</font> Ресурс `accounts` переименован в `athletes` - [GET /integration/judge-bot/v1/athletes](#operations-athletes-getAthletes)
    * <font color="red">**Breaking!**</font> [GET /integration/judge-bot/v1/athletes](#operations-athletes-getAthletes) - изменен формат списка дисциплин, для командных дисциплин добавлен идентификатор команды
    * [GET /integration/judge-bot/v1/disciplines](#operations-disciplines-getDisciplines) - добавился тип результатов "Место"
    * [POST /integration/judge-bot/v1/results](#operations-results-createResult) - добавился тип результатов "Место"

    <details>

    <summary>Предыдущие версии</summary>

    ### 1.0.0

    * Добавлен ресурс API divisions
    * Добавлен ресурс API disciplines
    * Добавлен ресурс API accounts
    * Добавлен ресурс API results

    </details>

security:
  - basic: []

paths:

  /integration/judge-bot/v1/divisions:
    get:
      summary: Получение списка филиалов
      tags:
        - divisions
      operationId: getDivisions
      responses:
        '200':
          description: Успешный ответ
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          description: ObjectId филиала
                        name:
                          type: string
                          description: Название филиала
                      required:
                        - id
                        - name
                required:
                  - items
              example:
                items:
                  - id: "507f1f77bcf86cd799439011"
                    name: "Центральный филиал"
                  - id: "507f1f77bcf86cd799439012"
                    name: "Восточный филиал"
        '401':
          $ref: '#/components/responses/AuthenticationError'

